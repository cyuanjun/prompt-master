<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="fgSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="fgGround" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="1" stop-color="#451a03"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="512" height="320" fill="url(#fgSky)"/>
  <!-- ground -->
  <rect y="320" width="512" height="192" fill="url(#fgGround)"/>

  <!-- back trees (silhouettes) -->
  <polygon points="0,320 60,180 120,320" fill="#7c2d12"/>
  <polygon points="80,320 150,160 220,320" fill="#9a3412"/>
  <polygon points="180,320 250,140 320,320" fill="#7c2d12"/>
  <polygon points="280,320 360,170 440,320" fill="#9a3412"/>
  <polygon points="400,320 470,200 512,320" fill="#7c2d12"/>

  <!-- foliage burst tops on trees -->
  <circle cx="60" cy="180" r="36" fill="#dc2626"/>
  <circle cx="150" cy="160" r="42" fill="#ea580c"/>
  <circle cx="250" cy="140" r="48" fill="#dc2626"/>
  <circle cx="360" cy="170" r="40" fill="#f97316"/>
  <circle cx="470" cy="200" r="36" fill="#dc2626"/>

  <!-- cabin -->
  <rect x="200" y="280" width="120" height="80" fill="#451a03" stroke="#1c0a02" stroke-width="2"/>
  <polygon points="190,280 260,220 330,280" fill="#1c0a02" stroke="#000" stroke-width="2"/>
  <!-- window glow -->
  <rect x="225" y="305" width="30" height="28" fill="#fbbf24"/>
  <rect x="225" y="305" width="30" height="28" fill="none" stroke="#1c0a02" stroke-width="2"/>
  <line x1="240" y1="305" x2="240" y2="333" stroke="#1c0a02" stroke-width="1.5"/>
  <line x1="225" y1="319" x2="255" y2="319" stroke="#1c0a02" stroke-width="1.5"/>
  <!-- door -->
  <rect x="280" y="320" width="22" height="40" fill="#1c0a02"/>
  <!-- chimney -->
  <rect x="290" y="220" width="16" height="40" fill="#57534e"/>

  <!-- smoke from chimney -->
  <ellipse cx="300" cy="200" rx="14" ry="10" fill="#e5e7eb" opacity="0.85"/>
  <ellipse cx="296" cy="178" rx="18" ry="12" fill="#e5e7eb" opacity="0.7"/>
  <ellipse cx="304" cy="152" rx="22" ry="14" fill="#e5e7eb" opacity="0.55"/>
  <ellipse cx="298" cy="124" rx="26" ry="16" fill="#e5e7eb" opacity="0.4"/>

  <!-- fallen leaves on ground -->
  <g>
    <circle cx="60" cy="380" r="5" fill="#dc2626"/>
    <circle cx="100" cy="420" r="4" fill="#ea580c"/>
    <circle cx="160" cy="395" r="5" fill="#f97316"/>
    <circle cx="180" cy="450" r="4" fill="#dc2626"/>
    <circle cx="350" cy="400" r="5" fill="#ea580c"/>
    <circle cx="400" cy="430" r="4" fill="#dc2626"/>
    <circle cx="450" cy="395" r="5" fill="#f97316"/>
    <circle cx="80" cy="460" r="4" fill="#dc2626"/>
    <circle cx="380" cy="470" r="5" fill="#ea580c"/>
    <circle cx="240" cy="400" r="4" fill="#dc2626"/>
    <circle cx="280" cy="450" r="4" fill="#f97316"/>
  </g>

  <!-- path -->
  <path d="M 280 360 Q 270 420 240 510" fill="none" stroke="#a16207" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- demo watermark -->
  <text x="256" y="500" font-family="sans-serif" font-size="11" fill="#1a1a1a" opacity="0.4" text-anchor="middle">demo target</text>
</svg>
