<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a0033"/>
      <stop offset="1" stop-color="#3d0a4f"/>
    </linearGradient>
    <linearGradient id="street" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2a0a3a"/>
      <stop offset="1" stop-color="#0a0014"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff00ff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ff00ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00ffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="512" height="320" fill="url(#sky)"/>
  <!-- street -->
  <rect y="320" width="512" height="192" fill="url(#street)"/>

  <!-- left building -->
  <rect x="20" y="80" width="140" height="240" fill="#1a0a2e"/>
  <rect x="40" y="110" width="20" height="30" fill="#ff00ff" opacity="0.9"/>
  <rect x="80" y="160" width="20" height="20" fill="#fbbf24" opacity="0.85"/>
  <rect x="120" y="200" width="20" height="40" fill="#00ffff" opacity="0.8"/>
  <rect x="40" y="250" width="60" height="14" fill="#ff00ff" opacity="0.85"/>

  <!-- right building -->
  <rect x="340" y="40" width="160" height="280" fill="#15001f"/>
  <rect x="360" y="70" width="120" height="36" fill="#ff00ff" opacity="0.85"/>
  <rect x="360" y="120" width="40" height="40" fill="#00ffff" opacity="0.7"/>
  <rect x="430" y="160" width="50" height="20" fill="#fbbf24" opacity="0.9"/>
  <rect x="360" y="200" width="120" height="14" fill="#ff00ff" opacity="0.7"/>
  <rect x="360" y="240" width="60" height="20" fill="#00ffff" opacity="0.85"/>

  <!-- big neon sign center -->
  <rect x="180" y="100" width="160" height="50" fill="#0a0014" stroke="#ff00ff" stroke-width="3"/>
  <text x="260" y="135" font-family="monospace" font-size="28" font-weight="bold" fill="#ff00ff" text-anchor="middle" opacity="0.95">NEON</text>

  <!-- glow halos -->
  <ellipse cx="260" cy="125" rx="200" ry="60" fill="url(#glow)"/>
  <ellipse cx="120" cy="220" rx="80" ry="40" fill="url(#glowCyan)"/>

  <!-- rain streaks -->
  <g stroke="#7dd3fc" stroke-width="1" opacity="0.4">
    <line x1="40" y1="60" x2="36" y2="100"/>
    <line x1="100" y1="80" x2="96" y2="120"/>
    <line x1="180" y1="40" x2="176" y2="80"/>
    <line x1="260" y1="60" x2="256" y2="100"/>
    <line x1="340" y1="20" x2="336" y2="60"/>
    <line x1="420" y1="40" x2="416" y2="80"/>
    <line x1="60" y1="200" x2="56" y2="240"/>
    <line x1="220" y1="180" x2="216" y2="220"/>
    <line x1="380" y1="220" x2="376" y2="260"/>
  </g>

  <!-- street puddle reflections -->
  <ellipse cx="200" cy="430" rx="180" ry="16" fill="#ff00ff" opacity="0.2"/>
  <ellipse cx="380" cy="460" rx="100" ry="10" fill="#00ffff" opacity="0.18"/>

  <!-- steam from manhole -->
  <ellipse cx="120" cy="380" rx="30" ry="14" fill="#e5e7eb" opacity="0.3"/>
  <ellipse cx="125" cy="360" rx="22" ry="10" fill="#e5e7eb" opacity="0.22"/>
  <ellipse cx="130" cy="345" rx="16" ry="8" fill="#e5e7eb" opacity="0.15"/>

  <!-- demo watermark -->
  <text x="256" y="500" font-family="sans-serif" font-size="11" fill="#ffffff" opacity="0.4" text-anchor="middle">demo target</text>
</svg>
