<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="skyA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0c1a3a"/>
      <stop offset="1" stop-color="#1a3a5f"/>
    </linearGradient>
    <linearGradient id="streetA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="512" height="320" fill="url(#skyA)"/>
  <!-- street -->
  <rect y="320" width="512" height="192" fill="url(#streetA)"/>

  <!-- left building -->
  <rect x="20" y="100" width="140" height="220" fill="#1a1a2e"/>
  <rect x="40" y="130" width="20" height="30" fill="#3b82f6" opacity="0.7"/>
  <rect x="80" y="180" width="20" height="20" fill="#3b82f6" opacity="0.6"/>
  <rect x="120" y="220" width="20" height="40" fill="#3b82f6" opacity="0.65"/>

  <!-- right building -->
  <rect x="340" y="60" width="160" height="260" fill="#15152a"/>
  <rect x="360" y="90" width="120" height="30" fill="#3b82f6" opacity="0.6"/>
  <rect x="360" y="140" width="40" height="40" fill="#3b82f6" opacity="0.55"/>
  <rect x="430" y="180" width="50" height="20" fill="#3b82f6" opacity="0.55"/>

  <!-- glow -->
  <ellipse cx="260" cy="160" rx="200" ry="80" fill="url(#glowA)"/>

  <!-- rain streaks -->
  <g stroke="#7dd3fc" stroke-width="1" opacity="0.5">
    <line x1="40" y1="60" x2="36" y2="100"/>
    <line x1="100" y1="80" x2="96" y2="120"/>
    <line x1="180" y1="40" x2="176" y2="80"/>
    <line x1="260" y1="60" x2="256" y2="100"/>
    <line x1="340" y1="20" x2="336" y2="60"/>
    <line x1="420" y1="40" x2="416" y2="80"/>
    <line x1="60" y1="200" x2="56" y2="240"/>
    <line x1="220" y1="180" x2="216" y2="220"/>
    <line x1="380" y1="220" x2="376" y2="260"/>
  </g>

  <!-- light street reflection -->
  <ellipse cx="256" cy="450" rx="200" ry="14" fill="#3b82f6" opacity="0.15"/>

  <!-- demo watermark -->
  <text x="256" y="500" font-family="sans-serif" font-size="11" fill="#ffffff" opacity="0.4" text-anchor="middle">demo attempt</text>
</svg>
