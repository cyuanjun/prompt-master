<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="afSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="afGround" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#65a30d"/>
      <stop offset="1" stop-color="#365314"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="512" height="320" fill="url(#afSky)"/>
  <!-- ground -->
  <rect y="320" width="512" height="192" fill="url(#afGround)"/>

  <!-- back trees (green/summer) -->
  <polygon points="0,320 60,200 120,320" fill="#15803d"/>
  <polygon points="80,320 150,180 220,320" fill="#166534"/>
  <polygon points="280,320 360,190 440,320" fill="#15803d"/>
  <polygon points="400,320 470,210 512,320" fill="#166534"/>

  <!-- foliage tops (still green) -->
  <circle cx="60" cy="200" r="32" fill="#22c55e"/>
  <circle cx="150" cy="180" r="38" fill="#16a34a"/>
  <circle cx="360" cy="190" r="36" fill="#22c55e"/>
  <circle cx="470" cy="210" r="32" fill="#16a34a"/>

  <!-- cabin -->
  <rect x="210" y="280" width="100" height="70" fill="#7c2d12" stroke="#1c0a02" stroke-width="2"/>
  <polygon points="200,280 260,230 320,280" fill="#451a03" stroke="#000" stroke-width="2"/>
  <!-- window (no glow) -->
  <rect x="230" y="300" width="24" height="22" fill="#1c0a02"/>
  <!-- door -->
  <rect x="275" y="318" width="18" height="32" fill="#1c0a02"/>
  <!-- chimney (no smoke) -->
  <rect x="290" y="240" width="14" height="28" fill="#57534e"/>

  <!-- demo watermark -->
  <text x="256" y="500" font-family="sans-serif" font-size="11" fill="#1a1a1a" opacity="0.4" text-anchor="middle">demo attempt</text>
</svg>
